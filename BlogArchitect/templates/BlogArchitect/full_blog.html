<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Architect | {{ blog.topic }}</title>
    <style>
        /* Modern Dark Theme Variables (Matching Index) */
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            line-height: 1.7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Result Container */
        .container {
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
            background: var(--card);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(45deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .meta {
            color: var(--muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Labels & Boxes */
        .section-label {
            display: inline-block;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-top: 30px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .outline-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 25px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            font-style: italic;
            color: #cbd5e1;
            margin: 15px 0 30px 0;
        }

        .content-body {
            white-space: pre-wrap; /* Preserve line breaks from AI */
            font-size: 1.1rem;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 12px;
        }

        /* Action Buttons */
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <span class="meta">Generated by AI Architect</span>
            <h1>{{ blog.topic }}</h1>
            <div class="meta">{{ blog.created_at|date:"F d, Y" }}</div>
        </header>

        {% if blog %}
            <span class="section-label">Strategy Outline</span>
            <div class="outline-box">
                {{ blog.outline }}
            </div>

            <span class="section-label">Complete Blog Post</span>
            <div class="content-body">
                {{ blog.full_blog }}
            </div>
        {% else %}
            <div class="outline-box">No content available to display.</div>
        {% endif %}
        
        <div style="text-align: center;">
            <a href="javascript:history.back()" class="back-link">← Return to Architect</a>
        </div>
    </div>

</body>
</html>
