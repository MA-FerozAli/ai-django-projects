<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart FAQ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        /* Form Styling */
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* FAQ Item Styling */
        .faq-item {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
        }

        .faq-item h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .delete-link {
            color: #e74c3c;
            text-decoration: none;
            font-size: 0.9em;
        }

        .delete-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Add New Fact</h1>
    
    <form method="POST" action="{% url 'create' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Fact</button>
    </form>

    <h2>Existing FAQs</h2>
    {% for fact in facts %}
    <div class="faq-item">
        <h3>{{ fact.title }}</h3>
        <p>{{ fact.content }}</p>

        <div class="actions">
            <form method="GET" action="{% url 'update' fact.pk %}" style="box-shadow: none; padding: 0; margin: 0;">
                <button type="submit" style="background-color: #95a5a6;">Edit</button>
            </form>
            <a href="{% url 'delete' fact.pk %}" class="delete-link" onclick="return confirm('Are you sure?')">Delete</a>
        </div>
    </div>
    {% empty %}
    <p>No facts found. Add one above!</p>
    {% endfor %}

</body>
</html>
