<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Metadata Generator</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f4f7f6;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
        }

        form p {
            margin-bottom: 1rem;
        }

        /* Styling Django's form inputs */
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Critical for layout */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #357abd;
        }

        .results {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--secondary-color);
        }

        .result-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
        }

        .result-item strong {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>SEO Tools</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Generate Metadata</button>
        </form>

        {% if meta_description or meta_tags %}
        <div class="results">
            {% if meta_description %}
            <div class="result-item">
                <strong>Meta Description</strong>
                {{ meta_description }}
            </div>
            {% endif %}

            {% if meta_tags %}
            <div class="result-item">
                <strong>Meta Tags</strong>
                {{ meta_tags }}
            </div>
            {% endif %}
        </div>
        {% endif %}
    </div>
</body>
</html>
