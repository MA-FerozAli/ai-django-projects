<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ChatBot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* Chat Container */
        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        /* Message History Area */
        .messages-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 14px;
        }

        .user-message {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .model-message {
            align-self: flex-start;
            background-color: #e9ecef;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .role-label {
            font-size: 11px;
            margin-bottom: 4px;
            font-weight: bold;
            display: block;
            opacity: 0.7;
        }

        /* Form Area */
        .input-area {
            border-top: 1px solid #ddd;
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input[type="text"], textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #218838;
        }

        .clear-btn {
            margin-top: 15px;
            text-decoration: none;
            color: #dc3545;
            font-size: 13px;
        }

        .clear-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="messages-box">
            {% for msg in message %}
                <div class="message {% if msg.role == 'user' %}user-message{% else %}model-message{% endif %}">
                    <span class="role-label">
                        {% if msg.role == 'user' %}You{% else %}AI Model{% endif %}
                    </span>
                    {{ msg.message }}
                </div>
            {% empty %}
                <p style="text-align: center; color: #999;">No messages yet. Start a conversation!</p>
            {% endfor %}
        </div>

        <form class="input-area" method="POST">
            {% csrf_token %}
            {{ form.user_message }}
            <button type="submit">Send</button>
        </form>
    </div>
    
    <a href="{% url 'clear-chat' %}" class="clear-btn">Clear Chat History</a>

</body>
</html>
